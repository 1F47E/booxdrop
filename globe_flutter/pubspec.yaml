name: globe_quest
description: "GlobeQuest — kids guess where countries and capitals are on a 3D globe!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  shared_preferences: ^2.5.3
  http: ^1.3.0
  path_provider: ^2.1.0
  package_info_plus: ^8.0.0
  crypto: ^3.0.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/globe/
