name: booxchat
description: ChatGPT client for Boox devices
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  image_gallery_saver_plus: ^4.0.1
  just_audio: ^0.10.5
  package_info_plus: ^8.0.0
  crypto: ^3.0.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - CHANGELOG.md
