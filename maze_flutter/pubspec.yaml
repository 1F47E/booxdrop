name: maze_race
description: "Maze Race — kids build mazes and race to solve each other's!"
publish_to: 'none'
version: 1.4.0+9

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.3
  http: ^1.3.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.0
  package_info_plus: ^8.0.0
  crypto: ^3.0.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/

flutter_launcher_icons:
  android: true
  image_path: "icon_maze.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon_maze.png"
