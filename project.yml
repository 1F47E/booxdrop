name: BooxDrop
options:
  bundleIdPrefix: dev.kass
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  BooxDrop:
    type: application
    platform: macOS
    sources:
      - BooxDrop
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: BooxDrop/MTP/BridgingHeader.h
        HEADER_SEARCH_PATHS: /opt/homebrew/include
        LIBRARY_SEARCH_PATHS: /opt/homebrew/lib
        OTHER_LDFLAGS: -lmtp
        CODE_SIGN_ENTITLEMENTS: BooxDrop/BooxDrop.entitlements
        ENABLE_APP_SANDBOX: NO
        PRODUCT_BUNDLE_IDENTIFIER: dev.kass.BooxDrop
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: BooxDrop/BooxDrop.entitlements
      properties:
        com.apple.security.app-sandbox: false

  booxcp:
    type: tool
    platform: macOS
    sources:
      - BooxCLI
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: BooxCLI/BridgingHeader.h
        HEADER_SEARCH_PATHS: /opt/homebrew/include
        LIBRARY_SEARCH_PATHS: /opt/homebrew/lib
        OTHER_LDFLAGS: -lmtp
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
